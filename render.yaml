services:
  - type: web
    name: mobileshopbackend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        generateValue: true
      - key: DB_NAME
        fromDatabase:
          name: mobileshopdb
          property: database
      - key: DB_USER
        fromDatabase:
          name: mobileshopdb
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: mobileshopdb
          property: password
      - key: DB_HOST
        fromDatabase:
          name: mobileshopdb
          property: host
      - key: DB_PORT
        fromDatabase:
          name: mobileshopdb
          property: port
      - key: R2_BUCKET_NAME
        sync: false
      - key: R2_ENDPOINT_URL
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: ALLOWED_HOSTS
        value: mobile-shop-backend.onrender.com,.onrender.com

databases:
  - name: mobileshopdb
    plan: free
    databaseName: mobileshopdb
