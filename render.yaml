services:
  - type: web
    name: mobileshopbackend
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --no-input --settings=config.settings.production
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: DJANGO_ENV
        value: production
      - key: ALLOWED_HOSTS
        value: mobile-shop-backend.onrender.com,.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://mobile-shop-frontend-delta.vercel.app
      - key: SECRET_KEY
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "5432"
      - key: R2_BUCKET_NAME
        sync: false
      - key: R2_ENDPOINT_URL
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_PUBLIC_URL
        sync: false
